name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          gleam-version: "1.14.0"
          otp-version: "27.0"
      - run: cd gleam-visual && gleam build --target javascript
      - run: |
          mkdir -p dist/gleam
          cp -r gleam-visual/build/dev/javascript/* dist/gleam/
          cp gleam-visual/index.html dist/index.html
          cp essay_v2.html dist/essay_v2.html
          cp essay_v3.html dist/essay_v3.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
